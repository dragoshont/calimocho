# markdownlint-cli2 config for calimocho.
#
# Goals: catch real readability issues, not pedantry. We write English
# for non-native speakers and lean on long-line prose. Strict only on
# things the bot actually called us out on.

config:
  # MD013 line-length: prose lines vary, don't fight long URLs in
  # tables. Keep code-fence content unconstrained.
  MD013: false
  # MD033 inline HTML: ADRs sometimes need <details> for collapsibility.
  MD033: false
  # MD041 first-line-must-be-h1: NOTICE files start with title under-
  # lined ascii-style, not # H1.
  MD041: false
  # MD022 blanks-around-headings, MD031 blanks-around-fences,
  # MD032 blanks-around-lists: stylistic; not catching real bugs.
  MD022: false
  MD031: false
  MD032: false
  # MD026 trailing-punctuation in headings: our hard rules headings
  # end with periods deliberately ("### 1. We compile from source.").
  MD026: false
  # MD024 duplicate headings: ADRs all use Context/Decision/Consequences.
  MD024:
    siblings_only: true
  # MD040 fenced-code-language: ENFORCED. This was a PR #1 finding.
  MD040: true
  # MD046 code-block-style fenced vs indented: enforce fenced.
  MD046:
    style: fenced

ignores:
  - node_modules/**
  - build/**
  - out/**
  - THIRDPARTY/runtime-libs/README.md  # auto-generated by bundle-deps.sh
